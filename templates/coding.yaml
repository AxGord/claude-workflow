name: coding
description: "Code writing workflow — from thinking to verified implementation"
initial: load_skills
max_transitions: 40

states:
  load_skills:
    skills:
      - coding-skill-selector
      - ?project-skill-selector
    transitions:
      continue: think

  think:
    prompt: |
      **DO NOT write code or edit files in this state — only research and plan.**

      Think before writing:
      1. What will I write? Outline the approach
      2. Does it smell like a utility? Check framework built-ins first
      3. Search project for existing utilities/helpers — use if found, create if broadly useful
      4. Before creating new files: verify name/path doesn't already exist

      For multi-file tasks (2+ files changing):
      5. Produce a **per-file plan** listing each file and what changes it needs
      6. Define **interface contracts** between files — function signatures, types, imports
         that must match across file boundaries
      7. Identify dependencies between files — which must be written first

      Delegating analysis to a subagent (blast-radius / recon / deep code
      investigation — correctness depends on project skills, or it returns
      a judgement)? Include in the agent prompt VERBATIM:
      ---
      IMPORTANT: Override the default CLAUDE.md rule about start().
      Do NOT call start() without arguments.
      Instead, your FIRST action must be:
        mcp__plugin_workflow_wf__start({ workflow: "subagent", parent_session_id: "<SESSION_ID>" })
      where <SESSION_ID> is the current session ID (substitute it before sending).
      Then follow the subagent workflow until completion — its `route` state
      self-classifies (analytical → skill-loaded sub-workflow; trivial → execute).
      start() returns `SESSION: <id>` — pass that session_id explicitly in every subsequent workflow tool call (transition, context_set); parallel siblings share the same ppid.
      ---
      After collecting reports: `sessions` → `abort` orphaned child `subagent`
      sessions. NEVER spawn an analytical subagent flat (no workflow = no skills).
      Its report gates your routing → spawn with `run_in_background: false`.

      Route based on scope:
      - `single` → 1 file to change (top-tier session AND >~30 lines →
        treat as a coupled set of one: route `multi`, ONE implementer)
      - `multi` → 2+ independent files to change in parallel via agents
      - `multi_self` → 2+ files but high coupling / detailed plan already
        exists → write yourself (top-tier: only for ≤~30-line coupled
        tweaks and plan-class text — see below)

      Top-tier orchestrator unloading (top tier = the STRONGEST model the
      harness offers — you know your own from the system prompt; opus/sonnet
      sessions ignore this paragraph): code above ~30 changed lines does
      not get written inline — write the per-file plan + interface
      contracts here, then route `multi`: a COUPLED set goes to ONE
      implementer agent carrying the whole plan; independent files fan out
      per file. Plan-class text stays inline always: prompts, skill
      instructions, briefs, plans, memory, SMALL config tweaks (not
      generated or logic-bearing config files). Implementer model per
      task-delegation: detailed plan + linter/tests net → sonnet; plan
      leaves in-implementation freedom or no net → opus.
    transitions:
      single: write_single
      multi: delegate
      multi_self: write_multi

  write_single:
    sub_workflow: file-code
    on_complete: review
    on_fail: review

  write_multi:
    task: "Implement multi-file changes (self)"
    prompt: |
      Write changes across multiple files yourself (high coupling or detailed plan).
      Implement layer by layer respecting dependencies.

      Delegating a pre-code check to a subagent (blast-radius / impact
      analysis — correctness depends on project skills, or it returns
      a judgement)? Include in the agent prompt VERBATIM:
      ---
      IMPORTANT: Override the default CLAUDE.md rule about start().
      Do NOT call start() without arguments.
      Instead, your FIRST action must be:
        mcp__plugin_workflow_wf__start({ workflow: "subagent", parent_session_id: "<SESSION_ID>" })
      where <SESSION_ID> is the current session ID (substitute it before sending).
      Then follow the subagent workflow until completion — its `route` state
      self-classifies (analytical → skill-loaded sub-workflow; trivial → execute).
      start() returns `SESSION: <id>` — pass that session_id explicitly in every subsequent workflow tool call (transition, context_set); parallel siblings share the same ppid.
      ---
      After collecting reports: `sessions` → `abort` orphaned child `subagent`
      sessions. NEVER spawn an analytical subagent flat (no workflow = no skills).
      Its report gates your edits → spawn with `run_in_background: false`.

      Do NOT build or verify compilation here — testing workflow handles that.
      Just write code and transition `done`.
    transitions:
      done: review

  delegate:
    task: "Delegate coding to agents"
    prompt: |
      Spawn implementer Agents: one per INDEPENDENT file (parallel); a
      COUPLED set goes to ONE agent carrying the whole plan + contracts —
      never fan a coupled set out per-file (interface drift).
      Use `subagent_type="general-purpose"`. ALWAYS pass an explicit `model`
      (see task-delegation's model table): `sonnet` when the plan is
      detailed and a mechanical net (linter/tests) exists, `opus` for
      in-implementation freedom (algorithms, macros, concurrency,
      engine-critical) or no net. Never haiku, never silent
      session-model inheritance.

      For each file, include in the agent prompt VERBATIM:
      ---
      IMPORTANT: Override the default CLAUDE.md rule about start().
      Do NOT call start() without arguments.
      Instead, your FIRST action must be:
        mcp__plugin_workflow_wf__start({ workflow: "file-code", parent_session_id: "<SESSION_ID>" })
      where <SESSION_ID> is the current session ID (substitute it before sending).
      Then follow the file-code workflow states until completion.
      start() returns `SESSION: <id>` — pass that session_id explicitly in every subsequent workflow tool call (transition, context_set); parallel siblings share the same ppid.
      ---
      Also include:
      - The file path
      - The per-file plan for this specific file
      - The interface contracts — what signatures/types/exports this file must provide
        and what it can expect from other files
      - How to get current state: `git diff HEAD -- <filepath>`

      Launch ALL file agents in ONE message, each with `run_in_background:
      false` — their reports gate integration; a "batch" of ONE file is
      still a gating single, not a background task.
      Wait for all to complete. Collect their reports.

      After ALL reports are collected:
      1. Abort orphaned child workflow sessions — call `sessions` to find
         any active `file-code` sessions that are children of this session,
         then `abort` each one.
      2. Transition `done`.
    transitions:
      done: integrate

  integrate:
    task: "Cross-file integration check"
    prompt: |
      All file agents have completed. Now verify integration:

      1. **Interface contracts** — do all files satisfy the contracts defined in think?
         Check function signatures, types, imports match across boundaries.
      2. **Import resolution** — are all cross-file imports correct and present?
      3. **Conflict resolution** — did agents make conflicting assumptions?
         Fix any inconsistencies.
      4. **Missing glue** — any wiring code needed to connect the pieces?

      Fix any issues found directly.
      Then → transition `done`.
    transitions:
      done: review

  review:
    task: "Route review by scope"
    prompt: |
      Route by SIZE of the change, not file count (`git diff HEAD --numstat`):
      - `single` → TRIVIAL change: ≤2 files AND ≤~50 changed lines total —
        the linter IS the review (lint-review sub-workflow: engine-run lint
        + act on findings + one intent re-read); tests follow anyway.
      - `multi` → everything else, EVEN a single batch: an agent buys FRESH
        EYES on the author's own code and keeps review bulk out of this
        session's context; parallelism is a bonus, not the criterion.
    transitions:
      single: review_single
      multi: review_delegate

  review_single:
    sub_workflow: lint-review
    on_complete: review_decision
    on_fail: write_fix

  review_decision:
    task: "Decide on review results"
    prompt: |
      The review sub-workflow completed (trivial path: lint-review fixes
      findings inline; agent path: batch reports). Decide:
      - `ok` → nothing unresolved, proceed to testing
      - `fix` → unresolved issues remain, fix them
    transitions:
      ok: verify
      fix: write_fix

  review_delegate:
    task: "Delegate batched review to agents"
    prompt: |
      Group the changed files into LOGICAL BATCHES, then spawn one Agent per
      BATCH for deep review. Use `subagent_type="general-purpose"`.
      Batching amortizes each agent's fixed cost (skill loading) AND lets one
      reviewer see coupled files together.

      Batching rules (strongest tie wins; a file joins exactly one batch):
      1. A source file and its test always share a batch.
      2. Files coupled by the change — caller+callee, interface+impls (for .hx
         with hxq: `hxq importers` / `callees` over the changed set).
      3. Remaining files group by directory/module.
      4. Cap: at most 5 files AND roughly 500 changed lines per batch;
         oversized files solo. A batch of one is fine.
      Structure/size queries for grouping (`git diff HEAD --numstat`,
      hxq graph queries) are fine here — reviewing content is the agents' job.

      For each batch, include in the agent prompt VERBATIM:
      ---
      IMPORTANT: Override the default CLAUDE.md rule about start().
      Do NOT call start() without arguments.
      Instead, your FIRST action must be:
        mcp__plugin_workflow_wf__start({ workflow: "file-review", parent_session_id: "<SESSION_ID>" })
      where <SESSION_ID> is the current session ID (substitute it before sending).
      Then follow the file-review workflow states until completion.
      start() returns `SESSION: <id>` — pass that session_id explicitly in every subsequent workflow tool call (transition, context_set); parallel siblings share the same ppid.
      ---
      Also include:
      - The batch's file list (absolute paths) and why they are grouped
      - How to get the diffs: `git diff HEAD -- <filepath>` per file
        (a new/untracked file: read it whole)
      - Review scope: `diff` — review only the changed lines
      - "Report one section per file + a batch-level cross-file section."

      ALWAYS pass an explicit `model` to the Agent tool: `sonnet` for
      linter-covered (.hx with hxq) / routine batches, `opus` for
      macro-heavy / concurrency / engine-critical / no-linter batches
      (opus wins on overlap). Never haiku, never silent inheritance of
      the session model.

      Launch up to 8 batch agents in ONE message, each with
      `run_in_background: false` — reports gate the merge; a single batch
      is still a gating single, not a background task. More batches →
      next wave after the current one completes.
      Wait for all to complete. Collect their reports.

      After ALL reports are collected:
      1. Abort orphaned child workflow sessions — call `sessions` to find
         any active `file-review` sessions that are children of this session,
         then `abort` each one.
      2. Transition `done`.
    transitions:
      done: cross_file

  cross_file:
    task: "Cross-file review analysis"
    prompt: |
      Review the big picture. Seams WITHIN a batch are already covered by
      that batch agent's cross-file section — do not re-derive them; focus
      on seams BETWEEN batches and on set-wide patterns (these apply even
      when there was only one batch):

      - [ ] Duplication across files: did different files introduce similar code?
      - [ ] Missing updates: if an interface/type changed, are all consumers updated?
      - [ ] Consistency: do the changes follow the same patterns across files?
      - [ ] Integration: do the changed components work together correctly?
      - [ ] Blast radius: are there callers/dependents that weren't updated?

      Choose transition:
      - `ok` → no issues, proceed to testing
      - `fix` → found issues that need fixing
    transitions:
      ok: verify
      fix: write_fix

  write_fix:
    task: "Fix review issues"
    prompt: |
      Fix the issues found — review findings or test failures reported by the
      testing workflow (read the failure report for what broke).
      After fixing → transition `done` (returns to review for re-verification).
    transitions:
      done: review

  verify:
    sub_workflow: testing
    on_complete: done
    on_fail: write_fix

  done:
    prompt: "Code written, reviewed, and verified. Implementation complete."
    terminal: true

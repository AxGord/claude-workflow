name: subagent
description: "Workflow for sub-agents spawned by the Task tool. Routes to appropriate sub-workflow, completes task, and exits. No chat, planning, or reflection."
initial: route
max_transitions: 50

states:
  route:
    prompt: |
      You are a sub-agent with a specific assigned task.
      Route based on your task type — do NOT enter chat or planning mode.

      Analytical work (correctness depends on project skills, or it returns
      a judgement/recommendation) MUST take a skill-loaded path, never
      `execute`:
      - Read/understand/explore/verify code, blast-radius, recon, deep
        investigation → explore
      - Write/modify code → coding
      - Debug/investigate an issue → debugging
      - Fix a known bug → bug_fix
      - Look up docs or web info → research
      - Run or write tests → testing
      - ONLY a genuinely trivial run-and-report task (one command, paste
        output verbatim, zero judgement) → execute
    transitions:
      coding: run_coding
      explore: run_explore
      debugging: run_debugging
      bug_fix: run_bug_fix
      research: run_research
      testing: run_testing
      execute: execute

  execute:
    prompt: |
      Execute the assigned task directly. No sub-workflow needed.

      This leaf bypasses every skill gate. Honour whatever tooling/env
      constraints your spawn prompt specified (required CLIs, blocked
      commands). Strip noise, but quote every error, failing assertion,
      and number VERBATIM — don't paraphrase the signal or replace it
      with a verdict; the parent judges.

      When done → transition `done`.
    transitions:
      done: done

  run_coding:
    sub_workflow: coding
    on_complete: done
    on_fail: done

  run_explore:
    sub_workflow: explore
    on_complete: done
    on_fail: done

  run_debugging:
    sub_workflow: debugging
    on_complete: done
    on_fail: done

  run_bug_fix:
    sub_workflow: bug-fix
    on_complete: done
    on_fail: done

  run_research:
    sub_workflow: web-research
    on_complete: done
    on_fail: done

  run_testing:
    sub_workflow: testing
    on_complete: done
    on_fail: done

  done:
    terminal: true
    outcome: complete

name: research
description: "Research workflow — check existing knowledge, delegate, apply"
initial: check_existing
max_transitions: 20

states:
  check_existing:
    prompt: "Check loaded skills, MEMORY.md, and project docs first."
    transitions:
      already_known: apply
      need_research: delegate

  delegate:
    prompt: "Delegate to parallel researcher subagents. Use web-reading hierarchy."
    transitions:
      found: apply
      not_found: done

  apply:
    prompt: "Apply research results to the current task."
    transitions:
      done: done

  done:
    prompt: "Research complete."
    terminal: true

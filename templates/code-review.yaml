name: code-review
description: "Code review workflow"
initial: overview
max_transitions: 50

states:
  overview:
    prompt: |
      Determine review scope, get changed file list.
      Output file list, then → `understood`.
    transitions:
      understood: deep_review

  deep_review:
    prompt: "Route: `single` (1 file) or `multi` (2+ files)."
    transitions:
      single: review_single
      multi: review_delegate

  review_single:
    sub_workflow: file-review
    on_complete: cross_file
    on_fail: cross_file

  review_delegate:
    prompt: |
      Spawn one file-review agent per changed file in parallel.
      Each agent follows the `file-review` workflow.
      Collect reports, abort orphaned sessions, then → `done`.
    transitions:
      done: cross_file

  cross_file:
    prompt: |
      Cross-file analysis — duplication, missing updates,
      consistency, test coverage, integration, blast radius.
    transitions:
      done: summarize

  summarize:
    prompt: |
      Aggregate findings into:
      - **Obvious fixes** — objectively correct fix.
      - **Debatable concerns** — needs user input.
      No issues → `approve`. Any issues → `has_issues`.
    transitions:
      approve: done
      has_issues: apply_fixes

  apply_fixes:
    prompt: "Apply obvious fixes. Debatable remaining → `has_concerns`. All done → `all_clear`."
    transitions:
      has_concerns: discuss
      all_clear: done

  discuss:
    prompt: |
      Present debatable concerns to user. Discuss.
      Many/architectural → `plan`. Few small → `code`. Nothing → `skip`.
    transitions:
      plan: plan_changes
      code: code_changes
      skip: done

  plan_changes:
    sub_workflow: planning
    on_complete: done
    on_fail: done

  code_changes:
    sub_workflow: coding
    on_complete: done
    on_fail: done

  done:
    prompt: "Review complete."
    terminal: true
    outcome: complete

name: file-review
description: "Per-file deep review — spawned as an agent for each changed file, or run inline as a sub-workflow for a single file"
initial: probe_hxq
max_transitions: 25

states:
  # Spawned agents start a fresh session — parent context does not carry over,
  # so tool availability is probed here, deterministically, by the engine.
  probe_hxq:
    type: exec
    command: "command -v hxq >/dev/null 2>&1 && HXQ_QUIET=1 hxq probe 'class C{}' >/dev/null 2>&1"
    timeout: 15000
    context_set:
      hxq_available: "true"
    on_success: load_skills
    on_error: load_skills

  load_skills:
    skills:
      - coding-skill-selector
      - ?project-skill-selector
    transitions:
      continue: read_context

  read_context:
    task: "Read file and context"
    prompt: |
      You are reviewing a single file as part of a code review.
      The file path and diff info come from your task prompt (spawned agent)
      or from the conversation so far (inline sub-workflow).

      1. Read the diff for this file to understand what changed.
      2. Check the review scope from your task prompt:
         - `diff` scope → read the diff, then read the full methods/blocks containing changes.
           Changes can affect surrounding code, so always understand the logical context.
         - `full` scope → read the FULL file
      3. Read related files: imports, files that call this one, siblings in the same module.
         Check if similar code already exists elsewhere that could be reused or unified.
      4. Understand what changed and why.
      5. Save the file path for the engine's mechanical pass — MUST be absolute
         (the engine's exec cwd is the server's, not the reviewed project's):
         `context_set(key: "file_path", value: "<ABSOLUTE path of the reviewed file>")`
      6. hxq availability (engine probe): "{{context.hxq_available}}" (empty = unavailable).
         If it is non-empty, the file is .hx, and `Skill("hxq")` was not loaded at the
         skill gate → load it now (top-up); if empty, do not attempt hxq at all.

      Then → transition `done`.
    transitions:
      done: mechanical_pass

  # Engine-run lint pass — the agent cannot skip or water it down. The script
  # self-gates (non-.hx file or missing hxq → "SKIP: ..." output, exit 0).
  # Runs before authorship is known on purpose: for external/vendored files
  # the report is computed and then dropped by build_checklist — acceptable
  # cost for keeping the exec chain linear. The path goes via env, not
  # template interpolation into sh -c: a hostile filename ($(cmd).hx) in a
  # reviewed repo must not execute.
  mechanical_pass:
    type: exec
    command: "sh \"$WF_PLUGIN_ROOT/scripts/hxq-lint-file.sh\" \"$REVIEW_FILE\""
    env:
      REVIEW_FILE: "{{context.file_path}}"
    timeout: 60000
    max_output: 51200
    context_set:
      lint_report: "{{stdout}}"
    on_success: determine_authorship
    on_error: determine_authorship

  determine_authorship:
    task: "Determine code authorship"
    prompt: |
      Decide whether this file is user-authored or external/forked/vendored —
      this gates which personal rules apply downstream (style + architecture).

      Strong signals it is external / forked / vendored (set "false"):
      - `git remote -v` points to a third-party upstream the user does not control.
      - README/CLAUDE.md mentions "fork of X", "based on X", "vendored from X".
      - Path lives under `node_modules/`, `vendor/`, `third_party/`, a haxelib
        cache, or similar dependency location.

      Save the verdict:
      - ANY strong external signal present → `context_set({ key: "is_user_authored", value: "false" })`
      - Otherwise → `context_set({ key: "is_user_authored", value: "true" })`

      Default to "true" when signals are ambiguous — external markers are reliably
      detectable; user-authored markers are not, so ambiguity falls on the
      personal-rules side. Do not block on user input.

      Then → transition `done`.
    transitions:
      done: build_checklist

  build_checklist:
    task: "Build style checklist from skills"
    prompt: |
      Check `{{context.is_user_authored}}`. Treat empty as `"true"` (default).

      If `"false"` → personal style rules do not apply. Output:
      "Skipping personal-style checklist — file is external/forked/vendored.
      check_style will use only language-agnostic checks."
      Then → transition `done`.

      Otherwise (user-authored), build a concrete style checklist from loaded skills:

      Process the bare `preferences` skill plus each loaded `lang-*` and
      `preferences-*` skill ONE AT A TIME.
      For each skill:
      1. Re-read the FULL skill text
      2. Extract EVERY rule — each `// WRONG` example, explicit rule, or convention
         becomes a one-line check with the wrong pattern AND the correct one
      3. Count rules extracted from this skill and output the count

      Do NOT summarize, group, or prioritize — every rule matters equally.
      If your total is under 25 rules across all skills, you missed some — re-read.

      **Mechanical-pass subtraction.** The engine already ran the project
      linter on this file; its report:
      ---
      {{context.lint_report}}
      ---
      Decide ONCE whether the report is usable, and record the verdict for
      the downstream states:
      - USABLE = non-empty, its `===` headers name THIS file (a different
        file = stale report from an earlier pass in a reused session), and
        the lint section is real output — not "SKIP: ..." and not a
        mid-report "SKIP: hxq lint failed" (a broken linter verified nothing).
      - USABLE → `context_set(key: "lint_subtraction", value: "applied")`, then:
        - Its findings are review facts — carry them into your report as-is.
        - DROP from the manual checklist every rule the linter verifies
          mechanically. The authoritative list of what the linter owns: run
          `HXQ_QUIET=1 hxq lint --list-rules` (one call, id + description per
          line) — subtract by that list, not from memory, and subtract at
          rule granularity: a rule covers exactly what its description says,
          no more (e.g. explicit-type covers fields/params/returns, NOT
          local variables).
        - Keep judgment rules a linter cannot verify: comment quality,
          abstraction threshold, naming semantics, API shape, symmetry of
          add/remove listener pairs, domain correctness.
        - The 25-rule floor does not apply after subtraction.
      - NOT usable → `context_set(key: "lint_subtraction", value: "none")`,
        no subtraction — run the full manual checklist as written above.

      Escape hatch: if NO lang/preferences skills apply to this file type
      (e.g. config, YAML, docs), state so explicitly and continue — the
      language-agnostic checks in the following states still run.

      Output the full checklist, then → transition `done`.
    transitions:
      done: check_correctness

  check_correctness:
    task: "Check correctness"
    prompt: |
      Check based on review scope (`diff` or `full`).
      For `diff` scope: changed lines are entry points, but always check the
      logical context around them — the full method, callers of changed signatures,
      other uses of changed fields. A change can break surrounding code.
      - [ ] Logic errors: wrong conditions, off-by-one, inverted booleans, wrong operators
      - [ ] Dead guards: for EVERY guard/early-return/conditional check in changed code,
            trace all call sites and ask "can this condition ever be true/false here?"
            Apply knowledge from loaded skills (e.g. library callback ordering, lifecycle
            guarantees). If no execution path triggers the guard — it's dead code, remove it.
      - [ ] Edge cases: null/undefined, empty collections, zero, negative, boundary values
      - [ ] Error handling: uncaught exceptions, swallowed errors, wrong error types
      - [ ] Race conditions: async without awaits, shared mutable state
      - [ ] Resource leaks: unclosed handles, missing cleanup in error paths
      - [ ] Type mismatches: wrong argument types, unsafe casts
      - [ ] Regression risk: does this break existing callers or assumptions?

      Then → transition `done`.
    transitions:
      done: check_loops

  check_loops:
    task: "Audit every loop and iteration pattern"
    prompt: |
      Find loops based on review scope (`diff` = only loops in changed code, `full` = ALL loops in file). For each one, output:

        Line <N>: `<the loop header>` — iterates <what> to access <what> → verdict: ok / issue

      Check each loop against these anti-patterns. The examples are
      Haxe-flavored — translate each pattern to the file's language.
      Rules 5-6 are personal style preferences — apply them ONLY when
      `{{context.is_user_authored}}` is not "false" (treat empty as "true");
      for external/forked/vendored code check rules 1-4 only.
      If `{{context.lint_subtraction}}` is "applied", rules the linter owns
      (per the --list-rules subtraction already done in build_checklist) are
      pre-verified — do not re-derive them by hand (e.g. the if/else-if
      chain → switch rule); still walk EVERY loop for the rules the linter
      does NOT own.

      1. **Range-over-sparse-container**: the loop iterates an index range (`0...n`,
         `i++`) but uses the index to look up a Map/Dict/HashMap, with a null check
         to skip missing entries. This means the container is sparse and should be
         iterated directly instead of via index range.
         WRONG: `for (i in 0...n) { val = map[i]; if (val == null) continue; ... }`
         RIGHT: `for (key => val in map) { ... }` (with filter if needed)

      2. **Keys-then-lookup**: iterates `.keys()` then does a separate `map[key]`
         lookup inside the body. Use key-value destructuring instead.
         WRONG: `for (k in map.keys()) { v = map[k]; ... }`
         RIGHT: `for (k => v in map) { ... }`

      3. **Repeated linear scan**: the same collection is scanned multiple times in
         the same method or call chain to find related data that could be found in
         a single pass.

      4. **Wrong container for access pattern**: Array with `.contains()` checks
         (should be Set/Map), unsorted Array with binary-search-like access, etc.

      5. **Continue instead of guard**: when a single condition filters the entire
         loop body, use guard-style `for (...) if (cond) {` instead of
         `if (!cond) continue;`. But when multiple independent checks follow
         sequentially (each with its own variable), `continue` is fine.
         WRONG: `for (x in list) { if (x.type != Foo) continue; doWork(x); }`
         RIGHT: `for (x in list) if (x.type == Foo) { doWork(x); }`
         OK:    `for (f in range) { val = map[f]; if (val == null) continue; ... }`

      6. **If/else-if chain instead of switch**: when a loop body checks the same
         variable with `if/else if` chain (e.g. `if (x == "a") ... else if (x == "b")`),
         use `switch` instead — cleaner, exhaustive, idiomatic.
         WRONG: `if (node.name == "a") { ... } else if (node.name == "b") { ... }`
         RIGHT: `switch node.name { case "a": ... case "b": ... }`

      You MUST list ALL loops with verdicts. Do not summarize or skip "obvious" ones.

      Then → transition `done`.
    transitions:
      done: check_style

  check_style:
    task: "Check code style"
    prompt: |
      Authorship: `{{context.is_user_authored}}` (set in determine_authorship).
      Treat empty as `"true"` (default).

      If `"false"` (external / forked / vendored):
      Skip the personal-style checklist entirely. Match THAT codebase's existing
      style — a one-line patch into a foreign project should look like it belongs.
      Only flag issues from the language-agnostic checks below.

      Otherwise (user-authored):
      Go through EVERY item in your style checklist from build_checklist.
      Personal rules are authoritative — a neighboring file violating the same
      rule is a bug replicated in both places, not a valid pattern. Flag it.
      Never dismiss a checklist hit with "the sibling does it this way".

      Scope: `diff` = scan only lines in the diff; `full` = scan entire file.
      If a line appears in the diff, it is part of the change and must meet
      current style standards. Report with file:line.

      If `{{context.lint_subtraction}}` is "applied", skip the parts of the
      items below the linter already verified (per the build_checklist
      subtraction) and hand-check only the residues its rule descriptions
      do not cover — e.g. type annotations on LOCAL variables (explicit-type
      covers fields/params/returns only), "function doing too many things"
      beyond the cyclomatic threshold, semantics of names, commented-out
      code, cross-file duplication, consistency judgments.

      Language-agnostic checks (apply regardless of authorship):
      - [ ] Missing type annotations: if a variable/field/parameter has no explicit type
            and adding one would improve clarity, recommend it — but ONLY after you find
            the actual type definition in the codebase (via Grep/Read). Never guess types.
            Use short type names + import, not fully qualified paths (e.g. `MyClass`,
            not `com.package.MyClass`) — unless a name conflict or conditional compilation
            requires the full path (check loaded lang/preferences skills for specifics).
      - [ ] Naming: consistent with the conventions of THIS codebase (the user's own
            for user-authored, the upstream's for external).
      - [ ] Member ordering: new fields and methods must respect class member order
            (constants → public vars → private vars → constructor → instance methods →
            static methods). Check that added code is in the right section, not just
            appended next to related code.
      - [ ] Duplication: does this duplicate existing code? Search the codebase.
      - [ ] Dead code: unused imports, commented-out code (dead guards checked in check_correctness).
            Imports used only inside conditional-compilation blocks are dead in
            the other branches — reference such symbols via fully qualified name
            inside the conditional block instead of adding a top-level import.
      - [ ] Complexity: overly nested logic, functions doing too many things
      - [ ] Consistency: does new code follow patterns in the same module of THIS
            codebase? (For user-authored code, this means the user's own conventions —
            not a license to replicate violations from sibling files.)

      Then → transition `done`.
    transitions:
      done: check_architecture

  check_architecture:
    task: "Check architecture"
    prompt: |
      Authorship: `{{context.is_user_authored}}` (set in determine_authorship).
      Treat empty as `"true"` (default).

      Check structural quality (scope: `diff` = changed code, `full` = entire file).

      Language-agnostic checks (apply regardless of authorship):
      - [ ] Unnecessary indirection: wrapper classes/methods that just forward calls
      - [ ] Dead abstractions: interface with one implementation, base class with one subclass
      - [ ] God class: file doing too many unrelated things — should it be split?
      - [ ] Overcomplicated: deep inheritance or nesting that could be flattened
      - [ ] Wrong level: logic placed in the wrong layer (UI doing data work, model doing display)
      - [ ] Stale patterns: old patterns that predate current codebase conventions
      - [ ] Complexity without pain: abstractions, patterns, or layers added for hypothetical future needs

      Architecture-skill checks (skip ONLY when `is_user_authored` is `"false"`):
      - [ ] Initialization in parent: parent manually triggers component's internal setup — should be inside the component
      - [ ] Serialization in runtime state: serialize/deserialize mixed into state classes — should be separate
      - [ ] Event re-dispatch duplication: re-dispatched event carries fields that duplicate event.target

      Only flag real simplification opportunities — don't invent hypothetical improvements.

      Then → transition `done`.
    transitions:
      done: check_security

  check_security:
    task: "Check security"
    prompt: |
      Check code for security issues (scope: `diff` = changed code, `full` = entire file):
      - [ ] Injection: unsanitized inputs reaching dangerous APIs
      - [ ] Auth/authz: missing or insufficient access controls
      - [ ] Data exposure: secrets, credentials, or sensitive data leaking
      - [ ] Input validation: missing validation at system boundaries
      - [ ] Unsafe operations: anything exploitable by malicious input

      Only flag real risks — don't invent hypothetical issues.
      Then → transition `done`.
    transitions:
      done: report

  report:
    task: "Write file review report"
    prompt: |
      Write a structured report for this file:

      **File**: <path>
      **What changed**: <one-paragraph summary of the changes>
      **Issues found**:
      For each issue:
      - Severity: bug / risk / style / nit / pre-existing
        (`pre-existing` = issue outside the changed lines, found during
        a diff-scope review — report separately, do NOT mix with diff issues)
      - Line: <line number>
      - Description: <what's wrong>
      - Suggestion: <how to fix>

      If no issues found, say so explicitly.

      Output this report — as your final response (spawned agent) or into the
      conversation for the parent workflow (inline sub-workflow).
      Then → transition `done`.
    transitions:
      done: finish

  finish:
    terminal: true
    outcome: complete

name: debugging
description: "Debugging workflow — diagnose first, fix never (until diagnosed)"
initial: load_skills
max_transitions: 40

states:
  load_skills:
    skills:
      - coding-skill-selector
      - "?debugging"
      - ?project-skill-selector
    transitions:
      continue: reproduce

  reproduce:
    prompt: |
      **Rule #1: Diagnose FIRST, fix NEVER.**
      **Rule #2: Reproduce BEFORE fixing.**

      1. Build with diagnostic flags from loaded skills
      2. Reproduce the bug via debug bridge or manual steps
      3. Confirm the crash/error happens

      Do NOT jump to fixing based on code reading alone.

      Choose transition:
      - `reproduced` → bug confirmed, ready to diagnose
      - `need_info` → can't reproduce, need more details from user
    transitions:
      reproduced: hypothesize
      need_info: clarify

  clarify:
    prompt: |
      Ask the user for more details about the bug:
      - Exact steps to reproduce
      - Error messages or logs
      - When it started happening
      - Any recent changes

      If there is no interactive user (you are running as a subagent), do NOT ask — state your assumptions and continue, or take the failure path.

      Choose transition:
      - `got_info` → have enough info to try reproducing again
      - `escalate` → no way to get more information; give up
    transitions:
      got_info: reproduce
      escalate: escalated

  hypothesize:
    prompt: |
      **Step 1: Hypothesize WHERE, not WHY.**

      Before adding traces, narrow down WHERE the problem is — not why it happens.
      Form 1-3 hypotheses about the location of the bug.

      Choose transition:
      - `trace` → ready to add targeted traces to test hypotheses
      - `escalate` → out of hypotheses (or trace budget exhausted); report findings
    transitions:
      trace: trace
      escalate: escalated

  trace:
    max_visits: 5
    prompt: |
      Add 3-5 targeted traces with unique prefixes (`[DBG1]`, `[DBG2]`).

      Delegate the build+run to a flat `general-purpose` subagent
      (build/run/report — no workflow, no skills) to keep build output
      out of main context: give it the build command, run command, what
      to look for, and a timeout.
      A flat subagent inherits none of this project's skills or env
      rules — it only knows what YOU put in its spawn prompt. So include
      VERBATIM in that prompt: (a) any tooling/hook constraints that
      apply in this project (required CLIs, blocked commands), and
      (b) "Strip noise, but quote every error, failing assertion, and
      number VERBATIM — don't paraphrase the signal or replace it with
      a verdict; the parent judges."
      Spawn with `run_in_background: false` — you need the result before transitioning.

      **Anti-patterns:**
      - Running builds in main context (100KB+ noise)
      - Adding Mutex/volatile "just in case" — masks real problem

      Budget: 5 visits to this state (engine-enforced); when nearly exhausted, choose `escalate` instead of retrying.

      Choose transition:
      - `found` → root cause identified
      - `more_traces` → need more data
      - `bridge` → need interactive debug bridge inspection
      - `escalate` → exhausted trace attempts
    transitions:
      found: diagnosed
      more_traces: trace
      bridge: load_skills_bridge
      escalate: escalated

  load_skills_bridge:
    skills:
      - ?debug-bridge
    transitions:
      continue: bridge_debug

  bridge_debug:
    prompt: |
      Use the debug bridge for interactive state inspection.
      Launch a `general-purpose` subagent to build and launch the app.
      Inspect state, take screenshots, simulate events.

      Choose transition:
      - `found` → root cause identified via bridge
      - `back_to_trace` → need more code-level tracing
      - `escalate` → bridge inspection exhausted (or trace budget spent); report findings
    transitions:
      found: diagnosed
      back_to_trace: trace
      escalate: escalated

  diagnosed:
    prompt: |
      Root cause identified. Present diagnosis to the user, then decide:
      - Trivial fix (1-2 lines, obvious, no risk) → `fix`
      - Significant changes needed → `done` (exit to parent workflow; user decides next)
      - Unclear scope or trade-offs → `ask_user`
    transitions:
      fix: fix
      done: done
      ask_user: ask_user

  ask_user:
    prompt: |
      Present findings and trade-offs. Ask user how to proceed:
      - Quick fix here? → `fix`
      - Plan a bigger change? → `done` (exit to parent workflow)
      - More investigation needed? → `investigate`

      If there is no interactive user (you are running as a subagent), do NOT ask — state your assumptions and continue, or take the failure path.
    transitions:
      fix: fix
      done: done
      investigate: hypothesize

  fix:
    prompt: |
      Root cause identified. Fix the bug.
      Apply the minimal fix that addresses the root cause.
      Do NOT add defensive code "just in case" — fix the actual problem.
      After fixing → transition `review`.
    transitions:
      review: mini_review

  mini_review:
    prompt: |
      Re-read what you just wrote. Code review only — do NOT build or run tests.
      1. Typos, edge cases, off-by-one, null refs
      2. Does the change affect surrounding logic?
      3. Ripple check — grep all call sites of changed functions
      - `ok` → proceed to testing
      - `fix` → go back and fix
    transitions:
      ok: verify
      fix: fix

  verify:
    sub_workflow: testing
    on_complete: final_review
    on_fail: fix

  final_review:
    prompt: |
      Tests pass. Full review of all changes made during debugging.
      1. New + old code together — do they fit?
      2. Dead code — did the fix make something unnecessary?
      3. Constants/config — magic values?
      4. Simplification opportunities?
      - `ok` → done
      - `fix` → needs more work
    transitions:
      ok: done
      fix: fix

  done:
    prompt: "Debugging complete. Present findings to user."
    terminal: true

  escalated:
    prompt: |
      Could not diagnose the root cause. Report findings to the user:
      - What was tried
      - What was ruled out
      - Remaining hypotheses
    terminal: true
    outcome: fail
